<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>
    <!-- Auto-redirect to My Orders after 5 seconds -->
    <meta http-equiv="refresh" content="5;url={{ url_for('orders.my_orders') }}">
    <!-- Bootstrap CSS for nice styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4fff4;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: green;
            margin-top: 50px;
        }
        .receipt-table th, .receipt-table td {
            text-align: center;
        }
        .note {
            margin-top: 20px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h1 class="text-center">✅ Payment Successful!</h1>
        <h3 class="text-center mt-3">Order ID: {{ order_id }}</h3>

        <table class="table table-bordered table-striped mt-4 receipt-table">
            <thead class="table-dark">
                <tr>
                    <th>Book ID</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.book_id }}</td>
                    <td>{{ item.quantity }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <p class="text-center note">
            You will be redirected to your <strong>My Orders</strong> page in 5 seconds.
        </p>

        <div class="text-center mt-3">
            <a href="{{ url_for('orders.my_orders') }}" class="btn btn-primary">Go to My Orders Now</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
