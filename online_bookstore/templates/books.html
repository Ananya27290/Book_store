<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% extends 'base.html' %}
{% block content %}
    <h2 class="text-center mb-4">Available Books</h2>

    <div class="row">
        {% for book in books %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img src="{{ book.cover_image or 'https://via.placeholder.com/150' }}" class="card-img-top" alt="{{ book.title }}">
                <div class="card-body">
                    <h5 class="card-title">{{ book.title }}</h5>
                    <p class="card-text">Author: {{ book.author }}</p>
                    <p class="card-text">Category: {{ book.category or 'Uncategorized' }}</p>
                    <p class="card-text">Price: ₹{{ book.price }}</p>

                    <form action="{{ url_for('cart.add_to_cart', book_id=book.id) }}" method="POST">
                        <div class="input-group">
                            <input type="number" name="quantity" value="1" min="1" class="form-control" required>
                            <button type="submit" class="btn btn-success">Add to Cart</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
</body>
</html>
