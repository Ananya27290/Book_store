<!-- templates/admin_add_book.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Book - Admin</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('admin.admin_dashboard') }}">📚 Admin Panel</a>
      <a class="btn btn-outline-light ms-auto" href="{{ url_for('book.list_books') }}">← Back</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-header bg-primary text-white text-center">
            <h4>Add New Book</h4>
          </div>
          <div class="card-body p-4">
            <form method="POST">
              
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" name="title" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Author</label>
                <input type="text" class="form-control" name="author">
              </div>

              <div class="mb-3">
                <label class="form-label">Genre</label>
                <input type="text" class="form-control" name="genre">
              </div>

              <div class="mb-3">
                <label class="form-label">Language</label>
                <input type="text" class="form-control" name="language">
              </div>

              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Price (₹)</label>
                  <input type="number" step="0.01" class="form-control" name="price">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Stock</label>
                  <input type="number" class="form-control" name="stock">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Category ID</label>
                <input type="number" class="form-control" name="category_id">
              </div>

              <div class="mb-3">
                <label class="form-label">Cover Image URL</label>
                <input type="text" class="form-control" name="cover_image">
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">➕ Add Book</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
