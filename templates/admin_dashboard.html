<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            color: #333;
        }

        a.button {
            display: inline-block;
            padding: 8px 12px;
            margin-bottom: 15px;
            margin-right: 10px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        a.button.info {
            background-color: #17a2b8;
        }

        a.button.edit {
            background-color: #007bff;
        }

        button.delete-button {
            background-color: #dc3545;
            color: white;
            padding: 4px 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button.delete-button:hover {
            background-color: #c82333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid #aaa;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        form.inline-form {
            display: inline;
        }
    </style>
</head>
<body>

    <h2>Admin Dashboard - Manage Books</h2>

    <!-- 📦 View Orders Button -->
    <a href="{{ url_for('admin.view_all_orders') }}" class="button info">📦 View All Orders</a>

    <!-- ➕ Add Book Button -->
    <a href="{{ url_for('admin.add_book') }}" class="button">+ Add Book</a>

    <table>
        <thead>
            <tr>
                <th>ID</th><th>Title</th><th>Author</th><th>Price</th><th>Category</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.id }}</td>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>₹{{ book.price }}</td>
                <td>{{ book.category }}</td>
                <td>
                    <a href="{{ url_for('admin.edit_book', book_id=book.id) }}" class="button edit">Edit</a>
                    <form action="{{ url_for('admin.delete_book', book_id=book.id) }}" method="post" class="inline-form">
                        <button type="submit" class="delete-button" onclick="return confirm('Delete this book?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
