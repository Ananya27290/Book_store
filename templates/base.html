<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #212529;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
        }
        .sidebar h4 {
            margin-bottom: 30px;
        }
        .content {
            padding: 30px;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>Online Bookstore</h4>
        <a href="{{ url_for('book.list_books') }}">Books</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('cart.view_cart') }}">Cart</a>
            <a href="{{ url_for('orders.my_orders') }}">My Orders</a>
            {% if current_user.role == 'admin' %}
                <a href="{{ url_for('admin.admin_dashboard') }}">Admin Dashboard</a>
                <a href="{{ url_for('admin.view_all_orders') }}">Manage Orders</a>
            {% endif %}
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        {% endif %}
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
