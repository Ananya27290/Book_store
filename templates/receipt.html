
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center text-success">Payment Successful!</h2>
        <h4 class="text-center mt-3">Order ID: {{ order_id }}</h4>

        <table class="table table-bordered table-striped mt-4 text-center">
            <thead class="table-dark">
                <tr>
                    <th>Book ID</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.book_id }}</td>
                    <td>{{ item.quantity }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <p class="text-center mt-4 fs-5">
            Thank you for your purchase! Your order has been placed successfully.
        </p>

        <div class="text-center mt-3">
            <a href="{{ url_for('main.home') }}" class="btn btn-primary">Return to Home</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
